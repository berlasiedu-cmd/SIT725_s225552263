<!doctype html>
<html lang="en">
  <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Ghanaian Recipes</title>
      <meta property="og:type" content="website">
      <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
     <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
      <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- NAVBAR -->
    <nav>
      <div class="nav-wrapper navbar-size green">
        <span><img src="images/recipeslogo.png" class="logo"></span>
        <ul id="nav-mobile" class="right hide-on-med-and-down">
          <li><a target="_blank" href="https://www.britannica.com/place/Ghana">About Ghana</a></li>
        </ul>
      </div>
    </nav>

    <div class="container">

        <div class="container">

      <!-- INTRO TEXT -->
      <div class="intro-section center">
        <p>
          Welcome to my space. This is where I share awesome recipes of my favourite Ghanaian dishes.
          Try out these recipes and share your experience with the world. Happy Cooking!
        </p>
      </div>

      <div class="center" id="openModalBtn">
        <button type="button">Sign Up</button>
      </div>
      
      <!-- SEARCH BAR -->
      <div class="row" style="margin-top:20px;">
        <div class="input-field col s12">
          <input id="search" type="text" placeholder="Search recipes...">
        </div>
      </div>


      <!-- CARDS -->
      <div id="recipe-list" class="row"></div>

    </div>

    
  </div>

                    <!-- Modal Structure -->
            <div id="signupForm"  class="modal modal-fixed-footer">
                <div class="row modal-content">
                    <form id="actualForm" class="col s12">
                        <div class="row">
                            <div class="input-field col s6">
                                <input id="first_name" type="text" class="validate">
                                <label for="first_name">First Name</label>
                            </div>
                            <div class="input-field col s6">
                                <input id="last_name" type="text" class="validate">
                                <label for="last_name">Last Name</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-field col s12">
                                <input id="email" type="email" class="validate">
                                <label for="email">Email</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-field col s12">
                                <input id="password" type="password" class="validate">
                                <label for="password">Password</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-field col s12">
                                <input id="confpassword" type="password" class="validate">
                                <label for="password">Confirm Password</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-field col s12 center-align">
                                <button type="submit" class="waves-effect waves-light btn">SIGN UP</button>
                                
                            </div>
                        </div>
                    </form>
                </div>
            </div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Materialize JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<!-- Materialize CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Get all book items</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }

    #fetchBookItemsBtn {
      background-color: #2c6fad;
      color: white;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      border-radius: 4px;
    }

    #fetchBookItemsBtn:hover {
      background-color: #1e5a8e;
    }

    #bookItemsDisplay p {
      cursor: pointer;
      padding: 6px 8px;
      margin: 4px 0;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    #bookItemsDisplay p:hover,
    #bookItemsDisplay p.selected {
      background-color: #d0e4f7;
    }

    #bookDetail {
      margin-top: 24px;
      border: 1px solid #999;
      padding: 16px;
      border-radius: 4px;
      background: #f9f9f9;
      display: none;
    }

    #bookDetail h2 {
      margin-top: 0;
    }

    #bookDetail table {
      border-collapse: collapse;
      width: 100%;
    }

    #bookDetail td {
      padding: 6px 10px;
      vertical-align: top;
    }

    #bookDetail td:first-child {
      font-weight: bold;
      width: 130px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Books Catalogue developed by s225552263</h1>
  <p>Click the button below to get all book items from the server:</p>
  <button id="fetchBookItemsBtn">Get Book Items</button>

  <div id="bookItemsDisplay"></div>
  <div id="bookDetail"></div>

  <script>
    const btn = document.getElementById('fetchBookItemsBtn');
    const out = document.getElementById('bookItemsDisplay');
    const detail = document.getElementById('bookDetail');

    const fetchBtn   = document.getElementById('fetchBookItemsBtn');
    const showCreate = document.getElementById('showCreateBtn');
    
    const formPanel  = document.getElementById('formPanel');
    const formTitle  = document.getElementById('formTitle');
    const formMsg    = document.getElementById('formMsg');
    const editingId  = document.getElementById('editingId');

    // Render the list of books
    function render(items) {
      out.innerHTML = '';
      detail.style.display = 'none';
      detail.innerHTML = '';

      if (!Array.isArray(items) || items.length === 0) {
        out.textContent = 'No items';
        return;
      }

      for (const it of items) {
        const p = document.createElement('p');
        const price =
          typeof it.price === 'string'
            ? it.price
            : (it.price && it.price.$numberDecimal) || it.price || '';
        
        p.textContent = `${it.title} - ${it.currency || 'AUD'} ${price}`;
        p.dataset.id = it._id;

        p.addEventListener('click', () => {
          document.querySelectorAll('#bookItemsDisplay p').forEach(el => el.classList.remove('selected'));
          p.classList.add('selected');
          fetchBookDetail(it._id);
        });

        out.appendChild(p);
      }
    }

    // Fetch and display a single book's details
    async function fetchBookDetail(id) {
      detail.innerHTML = 'Loading...';
      detail.style.display = 'block';

      try {
        const res = await fetch(`/api/books/${id}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const body = await res.json();
        const book = body.data;

        const price =
          typeof book.price === 'string'
            ? book.price
            : (book.price && book.price.$numberDecimal) || book.price || '';

        detail.innerHTML = `
          <h2>Book Details</h2>
          <table>
            <tr><td>Title:</td>      <td>${book.title || ''}</td></tr>
            <tr><td>Author:</td>     <td>${book.author || ''}</td></tr>
            <tr><td>Year:</td>       <td>${book.year || ''}</td></tr>
            <tr><td>Genre:</td>      <td>${book.genre || ''}</td></tr>
            <tr><td>Summary:</td>    <td>${book.summary || ''}</td></tr>
            <tr><td>Price (AUD):</td><td>${price}</td></tr>
          </table>
        `;
      } catch (err) {
        console.error('Error fetching book detail:', err);
        detail.innerHTML = 'Error loading book details.';
      }
    }

    // Fetch all books on button click
    btn.addEventListener('click', async () => {
      out.textContent = 'Loading...';
      detail.style.display = 'none';
      try {
        const res = await fetch('/api/books');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const body = await res.json();
        render(body.data);
      } catch (err) {
        console.error('Error fetching book items:', err);
        out.textContent = 'Error fetching book items.';
      }
    });


    // ── List ──────────────────────────────────────────────
    function render(items) {
      out.innerHTML = '';
      detail.style.display = 'none';
      if (!Array.isArray(items) || items.length === 0) { out.textContent = 'No items'; return; }
      for (const it of items) {
        const p = document.createElement('p');
        const price = it.price?.$numberDecimal ?? it.price ?? '';
        p.textContent = `${it.title} - AUD ${price}`;
        p.dataset.id = it._id;
        p.addEventListener('click', () => {
          document.querySelectorAll('#bookItemsDisplay p').forEach(el => el.classList.remove('selected'));
          p.classList.add('selected');
          fetchDetail(it._id, it);
        });
        out.appendChild(p);
      }
    }
 
    fetchBtn.addEventListener('click', async () => {
      out.textContent = 'Loading...';
      detail.style.display = 'none';
      formPanel.style.display = 'none';
      try {
        const res  = await fetch('/api/books');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const body = await res.json();
        render(body.data);
      } catch (err) { out.textContent = 'Error fetching books.'; }
    });
 
    // ── Detail ────────────────────────────────────────────
    async function fetchDetail(mongoId, cached) {
      detail.innerHTML = 'Loading...';
      detail.style.display = 'block';
      try {
        const res  = await fetch(`/api/books/${mongoId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const body = await res.json();
        const b    = body.data;
        const price = b.price?.$numberDecimal ?? b.price ?? '';
        detail.innerHTML = `
          <h2>Book Details</h2>
          <table>
            <tr><td>Title:</td>      <td>${b.title||''}</td></tr>
            <tr><td>Author:</td>     <td>${b.author||''}</td></tr>
            <tr><td>Year:</td>       <td>${b.year||''}</td></tr>
            <tr><td>Genre:</td>      <td>${b.genre||''}</td></tr>
            <tr><td>Summary:</td>    <td>${b.summary||''}</td></tr>
            <tr><td>Price (AUD):</td><td>${price}</td></tr>
          </table>
          <br><button class="secondary" onclick="openEdit('${mongoId}', ${JSON.stringify(b).replace(/'/g,"&#39;")})">Edit this book</button>
        `;
      } catch { detail.innerHTML = 'Error loading book details.'; }
    }
 
    // ── Form helpers ──────────────────────────────────────
    function clearForm() {
      ['fId','fTitle','fAuthor','fYear','fGenre','fSummary','fPrice'].forEach(id => document.getElementById(id).value = '');
      editingId.value = '';
      formMsg.style.display = 'none';
    }
 
    function showMsg(text, type) {
      formMsg.textContent = text;
      formMsg.className = type;
      formMsg.style.display = 'block';
    }
 
    showCreate.addEventListener('click', () => {
      clearForm();
      document.getElementById('fId').disabled = false;
      formTitle.textContent = 'Add New Book';
      formPanel.style.display = 'block';
      formPanel.scrollIntoView({ behavior: 'smooth' });
    });
 
    document.getElementById('cancelFormBtn').addEventListener('click', () => {
      formPanel.style.display = 'none';
    });
 
    function openEdit(mongoId, book) {
      clearForm();
      editingId.value = mongoId;
      document.getElementById('fId').value    = book.id || '';
      document.getElementById('fId').disabled = true; // id is immutable
      document.getElementById('fTitle').value  = book.title || '';
      document.getElementById('fAuthor').value = book.author || '';
      document.getElementById('fYear').value   = book.year || '';
      document.getElementById('fGenre').value  = book.genre || '';
      document.getElementById('fSummary').value= book.summary || '';
      const price = book.price?.$numberDecimal ?? book.price ?? '';
      document.getElementById('fPrice').value  = price;
      formTitle.textContent = 'Edit Book';
      formPanel.style.display = 'block';
      formPanel.scrollIntoView({ behavior: 'smooth' });
    }
 
    // ── Submit (create or update) ─────────────────────────
    document.getElementById('submitFormBtn').addEventListener('click', async () => {
      const mongoId = editingId.value;
      const isEdit  = !!mongoId;
 
      const payload = {
        title:   document.getElementById('fTitle').value.trim(),
        author:  document.getElementById('fAuthor').value.trim(),
        year:    parseInt(document.getElementById('fYear').value, 10),
        genre:   document.getElementById('fGenre').value.trim(),
        summary: document.getElementById('fSummary').value.trim(),
        price:   document.getElementById('fPrice').value.trim()
      };
 
      if (!isEdit) payload.id = document.getElementById('fId').value.trim();
 
      try {
        const url    = isEdit ? `/api/books/${mongoId}` : '/api/books';
        const method = isEdit ? 'PUT' : 'POST';
        const res    = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const body = await res.json();
 
        if (res.ok) {
          showMsg(isEdit ? 'Book updated successfully!' : 'Book created successfully!', 'success');
          // Refresh list
          setTimeout(() => { fetchBtn.click(); formPanel.style.display = 'none'; }, 1200);
        } else {
          showMsg(`Error ${res.status}: ${body.message}`, 'error');
        }
      } catch (err) {
        showMsg('Network error. Please try again.', 'error');
      }
    });


  </script>
</body>
</html>
